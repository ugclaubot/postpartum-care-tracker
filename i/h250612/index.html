    const DASHBOARD_URL = "../../";
    const statusEl = document.getElementById("status");

    function fromBase64Url(value) {
      const base64 = value.replaceAll("-", "+").replaceAll("_", "/").padEnd(Math.ceil(value.length / 4) * 4, "=");
      const binary = atob(base64);
      return Uint8Array.from(binary, (char) => char.charCodeAt(0));
    }

    function fallbackState() {
      return { profile: { riskFlags: {}, clinicalContext: "" }, symptoms: {}, results: [], notes: [] };
    }

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (!parsed || typeof parsed !== "object") return fallbackState();
        parsed.profile = parsed.profile || {};
        parsed.profile.riskFlags = parsed.profile.riskFlags || {};
        parsed.symptoms = parsed.symptoms || {};
        parsed.results = Array.isArray(parsed.results) ? parsed.results : [];
        parsed.notes = Array.isArray(parsed.notes) ? parsed.notes : [];
        return parsed;
      } catch {
        return fallbackState();
      }
    }

    function hasResult(state, result) {
      return state.results.some((item) => item.id === result.id || (item.date === result.date && item.type === result.type && item.value === result.value));
    }

    function hasNote(state, note) {
      return state.notes.some((item) => item.id === note.id || (item.date === note.date && item.title === note.title && item.text === note.text));
    }

    async function decryptPayload() {
      const rawHash = window.location.hash.replace(/^#/, "");
      const params = new URLSearchParams(rawHash.includes("=") ? rawHash : "k=" + rawHash);
      const keyText = params.get("k");
      if (!keyText) throw new Error("Missing import key.");
      const key = await crypto.subtle.importKey("raw", fromBase64Url(keyText), "AES-GCM", false, ["decrypt"]);
      const packed = fromBase64Url(ENCRYPTED_PAYLOAD);
      const iv = packed.slice(0, 12);
      const tag = packed.slice(12, 28);
      const cipherText = packed.slice(28);
      const data = new Uint8Array(cipherText.length + tag.length);
      data.set(cipherText);
      data.set(tag, cipherText.length);
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return JSON.parse(new TextDecoder().decode(plain));
    }

    async function importPayload() {
      const payload = await decryptPayload();
      const state = loadState();
      state.profile.riskFlags = { ...state.profile.riskFlags, ...(payload.riskFlags || {}) };
      if (payload.clinicalContextAppend && !String(state.profile.clinicalContext || "").includes(payload.clinicalContextAppend)) {
        state.profile.clinicalContext = [state.profile.clinicalContext, payload.clinicalContextAppend].filter(Boolean).join("\n");
      }
      (payload.results || []).forEach((result) => { if (result && !hasResult(state, result)) state.results.push(result); });
      (payload.notes || []).forEach((note) => { if (note && !hasNote(state, note)) state.notes.push(note); });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state, null, 2));
      window.location.replace(DASHBOARD_URL);
    }

    importPayload().catch((error) => {
      statusEl.textContent = error.message || "Import failed. Please ask UG Clau for a fresh link.";
      statusEl.className = "error";
    });
